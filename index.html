<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prashast</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
}

.container{
text-align:center;
background:rgba(0,0,0,0.4);
padding:60px 100px;
border-radius:15px;
backdrop-filter:blur(8px);
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h1{
font-size:60px;
letter-spacing:2px;
margin-bottom:10px;
}

p{
opacity:0.8;
margin-bottom:30px;
}

button{
padding:12px 30px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00c6ff;
color:white;
transition:0.3s;
}

button:hover{
background:#0072ff;
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="container">
<h1>Gaming Zone</h1>
<p>Click Play Now To Continue</p>

<a href="https://poki.com" target="_blank">
<button>Play Now</button>
</a>

</div>

</body>
</html>
